; PlatformIO project for the LilyGo T-Display S3.
; Scans for the Victron Phoenix Inverter's BLE Instant Readout broadcast,
; decrypts and decodes it, and shows the live values on the built-in screen.

[env:lilygo-t-displays3]
platform = espressif32
board = lilygo-t-displays3
boards_dir = ./boards
framework = arduino

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM

lib_deps =
    h2zero/NimBLE-Arduino@^2.5.0

monitor_speed = 115200
